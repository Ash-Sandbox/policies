# yaml-language-server: $schema=https://hub.ashell.dev/schemas/policy/v1.json

schema_version: 1
publish:
  name: ash/python-dev
  version: 0.0.3
  description: Policy for Python development
  authors:
  - Ash Team <team@ashell.dev>
  license: MIT
files:
  rules:
  - path: ./..
    operations:
    - read
  - path: ./venv/bin/**
    operations:
    - read
  - path: /Users
    operations:
    - read
  - path: /private/tmp/**
  - path: ~/.cache/pip/**
  - path: ~/.cache/uv/**
  - path: ~/.local
    operations:
    - read
  - path: ~/.local/lib/python*/**
  - path: ~/.local/share
    operations:
    - read
  - path: ~/.local/share/uv/**
  - path: ~/.venv/**
  - path: ~/Library/Python
network:
  rules:
  - host: '**.pypi.org'
    ports:
    - 443
  - host: '**.python.org'
    ports:
    - 443
  - host: files.pythonhosted.org
    ports:
    - 443
exec:
  rules:
  - path: ./.venv/bin/ruff
  - path: /opt/homebrew/Cellar/uv/*/bin/uv
  - path: ~/.local/share/uv/python/**

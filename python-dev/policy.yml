# yaml-language-server: $schema=https://hub.ashell.dev/schemas/policy/v1.json

schema_version: 1
publish:
  name: ash/python-dev
  version: 0.0.1
  description: Policy for Python development
  authors:
  - Ash Team <team@ashell.dev>
  license: MIT
dependencies:
  ash/base-macos: ^0.0.2
files:
  rules:
  - path: /private/tmp/**
  - path: ~/.cache/pip/**
  - path: ~/.cache/uv/**
  - path: ~/.local/lib/python*/**
  - path: ~/.venv/**
  - path: ~/Library/Python
network:
  rules:
  - host: '**.pypi.org'
    ports:
    - 443
  - host: '**.python.org'
    ports:
    - 443
  - host: files.pythonhosted.org
    ports:
    - 443
exec:
  rules:
  - path: ./.venv/bin/ruff
  - path: /opt/homebrew/Cellar/uv/*/bin/uv
  - path: pip
  - path: pip3
  - path: poetry
  - path: python
  - path: python3
  - path: uv
  - path: uvx
